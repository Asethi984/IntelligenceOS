# =============================================================================
# IntelligenceOS — Self-Hosted Docker Compose
# =============================================================================
# Start:  docker compose up -d
# Logs:   docker compose logs -f backend
# Stop:   docker compose down
# Reset DB: docker compose down -v  (WARNING: deletes all data)
#
# Prerequisites:
#   1. Copy .env.example -> .env at repo root, fill in real values.
#   2. Ensure your LLM gateway is reachable at OPENAI_API_BASE.
#   3. If the gateway hostname doesn't resolve inside containers, set
#      DNS_SERVER in .env to your LAN router (e.g. 192.168.1.1).
# =============================================================================

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    profiles: ["mailpit"]

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Only container-network-specific overrides here.
      # All user-configurable vars come from .env via env_file above.
      - MONGO_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
    dns:
      - ${DNS_SERVER:-192.168.1.1}
      - 8.8.8.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8001"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build: ./backend
    restart: unless-stopped
    command: celery -A celery_tasks worker --loglevel=info
    env_file:
      - .env
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
    dns:
      - ${DNS_SERVER:-192.168.1.1}
      - 8.8.8.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - mongodb
    profiles: ["celery"]

  celery_beat:
    build: ./backend
    restart: unless-stopped
    command: celery -A celery_tasks beat --loglevel=info
    env_file:
      - .env
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
    dns:
      - ${DNS_SERVER:-192.168.1.1}
      - 8.8.8.8
    depends_on:
      - redis
    profiles: ["celery"]

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_BACKEND_URL=${APP_URL:-http://localhost:3000}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data:
  redis-data:
